<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Food Store</title>
        <link rel="stylesheet" href="../../../style.css">
    </head>

    <body>
        <header>
            <h1>Food Store</h1>
            <nav>
                <a href="../home/home.html">Catálogo</a>
                <a href="./cart.html">Carrito</a>
            </nav>
        </header>
        <!-- vista del carrito -->
        <main id="contenedor-productos">
    
            <section id="contenedor-carrito">
                </section>
        
            <aside class="tarjeta">
                <h2 class="tarjeta-titulo">Resumen</h2>
                
                <div class="tarjeta-descripcion">
                    <p>Subtotal: <span id="subtotal">$0</span></p>
                    <p><strong>Total: <span id="total-final">$0</span></strong></p>
                </div>
        
                <div class="tarjeta-footer">
                    <button id="btn-finalizar" class="btn-agregar">
                        Finalizar
                    </button>
                    
                    <button id="btn-vaciar" class="btn-agregar" style="background: var(--color-primario);">
                        Vaciar
                    </button>
                </div>
            </aside>
        </main>
        
        <footer>
            <p>© 2026 Food Store. Todos los derechos reservados.</p>
            <p>Contacto: info@foodstore.com</p>
        </footer>
    

        <script type="module" src="./cart.ts"></script>

    </body>
</html>
